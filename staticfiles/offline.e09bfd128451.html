<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#07090c">
    <link rel="apple-touch-icon" href="/images/pwa/icon-192.png">
    <title>Offline | Conquer Computers LLC</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Poppins", Arial, sans-serif;
            background: #07090c;
            color: #f6f4ee;
            padding: 24px;
        }

        .offline-card {
            width: min(100%, 520px);
            padding: 34px 26px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
            text-align: center;
            border-radius: 24px;
        }

        .offline-logo {
            width: 76px;
            height: 76px;
            object-fit: contain;
            margin-bottom: 18px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(1.8rem, 5vw, 2.6rem);
        }

        p {
            margin: 0 0 22px;
            line-height: 1.7;
            color: rgba(246, 244, 238, 0.78);
        }

        button {
            border: 1px solid rgba(255, 255, 255, 0.24);
            background: transparent;
            color: #fff;
            padding: 14px 20px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <main class="offline-card">
        <img class="offline-logo" src="/images/logo.png" alt="Conquer Computers LLC">
        <h1>You are offline</h1>
        <p>
            The application is currently unable to connect to the internet.
            Reconnect and reload to continue using the portal.
        </p>
        <button onclick="window.location.reload()">Try Again</button>
    </main>
    <script src="/static/js/pwa-register.js" defer></script>
</body>
</html>
